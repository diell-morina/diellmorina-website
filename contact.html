<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-T5MTHX7H');</script>
    <!-- End Google Tag Manager -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Diell Morina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
</head>
<body class="bg-[#f5f5f0] text-black min-h-screen p-6 md:p-12">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T5MTHX7H"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="max-w-2xl mx-auto">
        <div class="mb-12">
            <a href="index.html" class="text-blue-700 underline hover:bg-blue-700 hover:text-white transition-colors text-lg">← Back to Home</a>
        </div>

        <h1 class="text-3xl font-bold mb-8">Contact</h1>
        
        <form id="contactForm" action="https://api.web3forms.com/submit" method="POST" class="flex flex-col gap-6">
            <input type="hidden" name="access_key" value="4819b757-ac72-48c1-94b0-c397060ee5ae">
            <input type="hidden" name="redirect" value="https://diellmorina.com/success.html">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col">
                    <label for="first_name" class="mb-2 font-bold">First name</label>
                    <input type="text" id="first_name" name="first_name" required 
                           class="p-2 bg-transparent border border-black rounded-none outline-none focus:ring-2 focus:ring-black">
                </div>
                <div class="flex flex-col">
                    <label for="last_name" class="mb-2 font-bold">Last name</label>
                    <input type="text" id="last_name" name="last_name" required 
                           class="p-2 bg-transparent border border-black rounded-none outline-none focus:ring-2 focus:ring-black">
                </div>
            </div>

            <div class="flex flex-col">
                <label for="email" class="mb-2 font-bold">Email Address</label>
                <input type="email" id="email" name="email" required 
                       class="p-2 bg-transparent border border-black rounded-none outline-none focus:ring-2 focus:ring-black">
            </div>

            <div class="flex flex-col">
                <label for="message" class="mb-2 font-bold">Message</label>
                <textarea id="message" name="message" rows="5" required 
                          class="p-2 bg-transparent border border-black rounded-none outline-none focus:ring-2 focus:ring-black resize-y"></textarea>
            </div>

            <button type="submit" 
                    class="w-full md:w-auto px-8 py-3 bg-black text-white font-bold border border-black rounded-none hover:bg-transparent hover:text-black transition-colors cursor-pointer">
                Submit Message
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('contactForm');

        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Stop the browser from instantly redirecting (prevents GTM race condition!)

            // 1. Instantly push event & metadata to the GTM Data Layer
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
                'event': 'form_submission',
                'form_name': 'general_contact',
                'form_id': 'contactForm'
            });

            // 2. Package the form inputs and send to Web3Forms silently in the background (AJAX)
            const formData = new FormData(form);
            
            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    // 3. Only redirect once the submission network request finishes successfully
                    window.location.href = 'success.html';
                } else {
                    alert('Something went wrong. Please try again.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Form submission failed. Please check your connection.');
            });
        });
    </script>
</body>
</html>
