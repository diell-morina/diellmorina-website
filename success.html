<!DOCTYPE html>
<html lang="en">
<head>

    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-T5MTHX7H');</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Diell Morina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
</head>
<body class="bg-[#f5f5f0] text-black min-h-screen p-6 md:p-12">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T5MTHX7H"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="max-w-2xl mx-auto">
        <div class="mb-12">
            <a href="index.html" class="text-blue-700 underline hover:bg-blue-700 hover:text-white transition-colors text-lg">← Back to Home</a>
        </div>

        <div class="border border-black p-8 bg-transparent inline-block w-full">
            <h1 class="text-2xl font-bold mb-4">Message sent successfully!</h1>
            <p class="text-lg mb-2">Thank you for reaching out to me.</p>
            <p class="text-lg">I'll get back to you soon.</p>
        </div>

        <footer class="mt-12 text-xs text-gray-500 border-t border-black/10 pt-4 pb-20">
            © 2026 Diell Morina. <a href="privacy.html" class="underline hover:text-blue-700">Privacy Policy</a>
        </footer>
    </div>

    <!-- Cookie Consent Banner -->
    <div id="cookie-banner" style="position: fixed; bottom: 0; left: 0; width: 100%; background: #111; color: #fff; padding: 15px; font-family: monospace; font-size: 11px; display: none; box-sizing: border-box; z-index: 9999;">
        <div style="max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <span>We use Google Analytics and Microsoft Clarity to improve your experience. View our <a href="privacy.html" style="color: #fff; text-decoration: underline;">Privacy Policy</a>.</span>
            <button onclick="acceptCookies()" style="background: #fff; color: #111; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; font-family: monospace; border-radius: 0;">Accept</button>
        </div>
    </div>
    <script>
        if (!localStorage.getItem('cookieConsent')) {
            document.getElementById('cookie-banner').style.display = 'block';
        }
        function acceptCookies() {
            localStorage.setItem('cookieConsent', 'true');
            document.getElementById('cookie-banner').style.display = 'none';
        }
    </script>
</body>
